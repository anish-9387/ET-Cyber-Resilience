[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# The world model and evaluation harness are async; asyncio_mode = auto lets
# `async def test_*` run without decorating every test.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

addopts =
    -ra
    --strict-markers
    --tb=short

markers =
    slow: tests that run a full evaluation pass (deselect with '-m "not slow"')

filterwarnings =
    ignore::DeprecationWarning:langchain.*
    ignore::DeprecationWarning:langchain_community.*
